name: Converti XLS in JSON

on:
  push:
    paths:
      - 'PianificazioneAule.xls'

jobs:
  converti:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install xlrd

      - run: python converti.py

      - name: Commit orario.json
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add orario.json
          git diff --staged --quiet || git commit -m "Aggiorna orario.json"
          git push
